name: CI/CD SkillHub

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  ci:
    name: CI - Install / Lint / Test / Build
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: skillhub_db
          MYSQL_USER: skillhub_user
          MYSQL_PASSWORD: skillhub_pass
          MYSQL_ROOT_PASSWORD: root_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP 8.2 with extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_mysql, mbstring, exif, bcmath, gd, mongodb-2.2.1
          coverage: xdebug
          ini-values: xdebug.mode=coverage

      - name: Verify mongodb extension version
        run: php -r "echo phpversion('mongodb');"

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare Laravel environment
        run: |
          cat > .env << 'ENVEOF'
          APP_NAME=SkillHub
          APP_ENV=testing
          APP_DEBUG=true
          APP_URL=http://localhost
          APP_KEY=
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=skillhub_db
          DB_USERNAME=skillhub_user
          DB_PASSWORD=skillhub_pass
          SESSION_DRIVER=array
          CACHE_STORE=array
          QUEUE_CONNECTION=sync
          MONGO_HOST=127.0.0.1
          MONGO_PORT=27017
          MONGO_DATABASE=skillhub_logs
          MONGO_USERNAME=
          MONGO_PASSWORD=
          JWT_SECRET=
          MAIL_MAILER=log
          ENVEOF

          sed -i 's/^[[:space:]]*//' .env
          php artisan key:generate
          php artisan jwt:secret --force
          echo "=== Verification .env ==="
          grep -E "^DB_|^MONGO_|^JWT_|^APP_KEY" .env

      - name: Lint - PHP_CodeSniffer PSR-12
        run: |
          composer require --dev squizlabs/php_codesniffer --no-interaction --quiet
          vendor/bin/phpcs --standard=PSR12 --ignore=app/Http/Middleware,app/Providers,app/Mail,app/Console app/ || true

      - name: Test - PHPUnit with coverage
        run: |
          mkdir -p build/logs
          XDEBUG_MODE=coverage php -d xdebug.mode=coverage ./vendor/bin/phpunit \
            --coverage-clover=build/logs/clover.xml \
            --log-junit=build/logs/junit.xml \
            --coverage-filter=app

      - name: Normalize coverage paths
        run: |
          sed -i 's|/home/runner/work/.*/skillhub-back_CICD/||g' build/logs/clover.xml

      - name: Verify coverage file content
        run: |
          echo "=== Contenu build/logs ==="
          ls -la build/logs/
          echo "=== First lines of clover.xml ==="
          head -20 build/logs/clover.xml
          echo "=== Search for Windows paths ==="
          grep -n "C:\\\\xampp" build/logs/clover.xml || true

      - name: Build Docker image
        run: docker build -t skillhub-api:${{ github.sha }} .

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: build/logs/

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          args: -Dsonar.php.coverage.reportPaths=build/logs/clover.xml -Dsonar.php.tests.reportPath=build/logs/junit.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  cd:
    name: CD - Push image to Docker Hub
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image to Docker Hub
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/skillhub-api:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/skillhub-api:${{ github.sha }}
          echo "Image pushed: ${{ secrets.DOCKER_USERNAME }}/skillhub-api:${{ github.sha }}"
