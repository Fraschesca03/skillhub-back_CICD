name: CI/CD SkillHub

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:

  ci:
    name: CI - Install / Lint / Test / Build
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: skillhub_db
          MYSQL_USER: skillhub_user
          MYSQL_PASSWORD: skillhub_pass
          MYSQL_ROOT_PASSWORD: root_pass
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping -h localhost" --health-interval=10s --health-timeout=5s --health-retries=5

      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: --health-cmd="mongosh --eval 'db.runCommand({ping:1})'" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP 8.2 with extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_mysql, mbstring, exif, bcmath, gd, mongodb-2.2.1
          coverage: xdebug
          ini-values: xdebug.mode=coverage

      - name: Verify mongodb extension version
        run: php -r "echo phpversion('mongodb');"

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan jwt:secret --force
          sed -i "s|^DB_CONNECTION=.*|DB_CONNECTION=mysql|" .env
          sed -i "s|^DB_HOST=.*|DB_HOST=127.0.0.1|" .env
          sed -i "s|^DB_PORT=.*|DB_PORT=3306|" .env
          sed -i "s|^DB_DATABASE=.*|DB_DATABASE=skillhub_db|" .env
          sed -i "s|^DB_USERNAME=.*|DB_USERNAME=skillhub_user|" .env
          sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=skillhub_pass|" .env
          sed -i "s|^MONGO_HOST=.*|MONGO_HOST=127.0.0.1|" .env
          sed -i "s|^MONGO_PORT=.*|MONGO_PORT=27017|" .env
          sed -i "s|^MONGO_DATABASE=.*|MONGO_DATABASE=skillhub_logs|" .env
          echo "=== Verification .env ==="
          grep -E "^DB_|^MONGO_|^JWT_|^APP_KEY" .env

      - name: Lint - PHP_CodeSniffer PSR-12
        run: |
          composer require --dev squizlabs/php_codesniffer --no-interaction --quiet
          vendor/bin/phpcs --standard=PSR12 --ignore=app/Http/Middleware,app/Providers,app/Mail,app/Console app/ || true

      - name: Test - PHPUnit with coverage
        env:
          XDEBUG_MODE: coverage
        run: |
          mkdir -p build/logs
          php artisan test \
            --coverage-clover=build/logs/clover.xml \
            --log-junit=build/logs/junit.xml

      - name: Verify coverage reports exist
        run: |
          echo "=== Contenu build/logs ==="
          ls -la build/logs/
          echo "=== Lignes dans clover.xml ==="
          wc -l build/logs/clover.xml
          echo "=== Debut clover.xml ==="
          head -5 build/logs/clover.xml

      - name: Build Docker image
        run: docker build -t skillhub-api:${{ github.sha }} .

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: build/logs/

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          args: >
            -Dsonar.php.coverage.reportPaths=build/logs/clover.xml
            -Dsonar.php.tests.reportPath=build/logs/junit.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  cd:
    name: CD - Push image to Docker Hub
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image to Docker Hub
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/skillhub-api:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/skillhub-api:${{ github.sha }}
          echo "Image pushed: ${{ secrets.DOCKER_USERNAME }}/skillhub-api:${{ github.sha }}"
