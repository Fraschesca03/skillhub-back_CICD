# ============================================================
# SkillHub Backend - Pipeline CI/CD GitHub Actions
# Fix : ext-mongodb installe en version 2.2.0 via PECL
#       pour correspondre a composer.lock (require ^2.2)
# ============================================================

name: CI/CD SkillHub Backend

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/skillhub-back
  PHP_VERSION: '8.2'

jobs:

  # ===========================================================
  # JOB 1 : INSTALL
  # ===========================================================
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Installation de PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql, mbstring, xml, bcmath, intl
          tools: composer:v2
          coverage: none

      # Le composer.lock requiert ext-mongodb ^2.2
      # L image GitHub Actions a 2.1.4 par defaut donc on force 2.2.0
      - name: Installation de ext-mongodb 2.2.0 via PECL
        run: |
          sudo pecl install mongodb-2.2.0
          echo "extension=mongodb.so" | sudo tee /etc/php/8.2/cli/conf.d/20-mongodb.ini
          php -m | grep mongodb

      - name: Cache des dependances Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Installation des paquets Composer
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Sauvegarde de vendor
        uses: actions/upload-artifact@v4
        with:
          name: vendor
          path: vendor/
          retention-days: 1

  # ===========================================================
  # JOB 2 : LINT
  # ===========================================================
  lint:
    name: Lint (PSR-12)
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Installation de PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql, mbstring, xml, bcmath, intl
          tools: composer:v2
          coverage: none

      - name: Installation de ext-mongodb 2.2.0 via PECL
        run: |
          sudo pecl install mongodb-2.2.0
          echo "extension=mongodb.so" | sudo tee /etc/php/8.2/cli/conf.d/20-mongodb.ini

      - name: Recuperation de vendor
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor/

      - name: Installation de PHP_CodeSniffer
        run: composer global require squizlabs/php_codesniffer --quiet

      - name: Verification PSR-12 sur app/
        run: |
          ~/.composer/vendor/bin/phpcs \
            --standard=PSR12 \
            --extensions=php \
            --ignore=app/Http/Middleware/CorsMiddleware.php \
            app/

  # ===========================================================
  # JOB 3 : TEST + SONARCLOUD
  # ===========================================================
  test:
    name: Tests & SonarCloud
    runs-on: ubuntu-latest
    needs: install

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: skillhub_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -psecret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installation de PHP avec pcov pour la couverture
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql, mbstring, xml, bcmath, intl, pcov
          tools: composer:v2
          coverage: pcov

      - name: Installation de ext-mongodb 2.2.0 via PECL
        run: |
          sudo pecl install mongodb-2.2.0
          echo "extension=mongodb.so" | sudo tee /etc/php/8.2/cli/conf.d/20-mongodb.ini
          php -m | grep mongodb

      - name: Recuperation de vendor
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor/

      - name: Preparation du fichier .env
        run: |
          cp .env.example .env
          php artisan key:generate --quiet

      - name: Migration de la base de donnees
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: skillhub_test
          DB_USERNAME: root
          DB_PASSWORD: secret
          MONGO_HOST: 127.0.0.1
          MONGO_PORT: 27017
          MONGO_DATABASE: skillhub_test
          JWT_SECRET: ci_test_secret_key_for_skillhub_pipeline
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
        run: php artisan migrate --force --quiet

      - name: Execution des tests avec couverture
        env:
          APP_ENV: testing
          APP_KEY: ${{ secrets.APP_KEY }}
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: skillhub_test
          DB_USERNAME: root
          DB_PASSWORD: secret
          MONGO_HOST: 127.0.0.1
          MONGO_PORT: 27017
          MONGO_DATABASE: skillhub_test
          JWT_SECRET: ci_test_secret_key_for_skillhub_pipeline
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
        run: |
          mkdir -p build/logs
          php artisan test \
            --coverage-clover=build/logs/clover.xml \
            --log-junit=build/logs/junit.xml

      - name: Scan SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ===========================================================
  # JOB 4 : BUILD
  # ===========================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Construction de l image Docker taguee avec le git SHA
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .

  # ===========================================================
  # JOB 5 (CD) : PUSH - uniquement apres merge sur main
  # ===========================================================
  push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Connexion a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build et push de l image taguee
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Confirmation du tag publie
        run: echo "Image publiee : ${{ env.IMAGE_NAME }}:${{ github.sha }}"
