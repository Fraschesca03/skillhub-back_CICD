# ============================================================
# SkillHub Backend - Pipeline CI/CD GitHub Actions
#
# Declenchement :
#   - push sur main ou dev
#   - Pull Request vers main ou dev
#
# Jobs CI (tous les declenchements) :
#   1. install    - installation des dependances
#   2. lint       - analyse statique PHP (PSR-12)
#   3. test       - tests PHPUnit + couverture + SonarCloud
#   4. build      - construction image Docker taguee avec git SHA
#
# Job CD (push sur main uniquement) :
#   5. push       - publication de l image sur Docker Hub
# ============================================================

name: CI/CD SkillHub Backend

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

env:
  # Nom de l image Docker sur Docker Hub
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/skillhub-back
  PHP_VERSION: '8.2'

jobs:

  # ===========================================================
  # JOB 1 : INSTALL - Installation des dependances
  # ===========================================================
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Installation de PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql, mbstring, xml, bcmath, intl, mongodb
          tools: composer:v2
          coverage: none

      - name: Cache des dependances Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Installation des paquets Composer
        run: composer install --no-interaction --no-progress --prefer-dist

      # On sauvegarde vendor pour les jobs suivants
      - name: Sauvegarde de vendor
        uses: actions/upload-artifact@v4
        with:
          name: vendor
          path: vendor/
          retention-days: 1

  # ===========================================================
  # JOB 2 : LINT - Analyse statique du code PHP
  # ===========================================================
  lint:
    name: Lint (PSR-12)
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Installation de PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql, mbstring, xml, bcmath, intl, mongodb
          tools: composer:v2
          coverage: none

      - name: Recuperation de vendor
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor/

      # Installation de PHP_CodeSniffer en global (sans toucher composer.json)
      - name: Installation de PHP_CodeSniffer
        run: composer global require squizlabs/php_codesniffer --quiet

      # Verification de la conformite PSR-12 sur le code source
      - name: Verification PSR-12 sur app/
        run: |
          ~/.composer/vendor/bin/phpcs \
            --standard=PSR12 \
            --extensions=php \
            --ignore=app/Http/Middleware/CorsMiddleware.php \
            app/

  # ===========================================================
  # JOB 3 : TEST - Tests PHPUnit + couverture + SonarCloud
  # ===========================================================
  test:
    name: Tests & SonarCloud
    runs-on: ubuntu-latest
    needs: install

    # Services Docker pour les tests
    services:
      # Base de donnees MySQL pour les tests
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: skillhub_test
          MYSQL_USER: skillhub
          MYSQL_PASSWORD: secret
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -psecret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      # MongoDB pour les messages et activity logs
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4
        with:
          # fetch-depth 0 requis par SonarCloud pour l historique complet
          fetch-depth: 0

      - name: Installation de PHP ${{ env.PHP_VERSION }} avec pcov pour la couverture
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql, mbstring, xml, bcmath, intl, mongodb, pcov
          tools: composer:v2
          # pcov est plus rapide que xdebug pour la couverture
          coverage: pcov

      - name: Recuperation de vendor
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor/

      # Configuration de l environnement pour les tests CI
      - name: Preparation du fichier .env
        run: |
          cp .env.example .env
          php artisan key:generate --quiet

      # Execution des migrations sur la base de test
      - name: Migration de la base de donnees de test
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: skillhub_test
          DB_USERNAME: root
          DB_PASSWORD: secret
          MONGO_HOST: 127.0.0.1
          MONGO_PORT: 27017
          MONGO_DATABASE: skillhub_test
          JWT_SECRET: ci_test_secret_key_for_skillhub_pipeline
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
        run: php artisan migrate --force --quiet

      # Execution des tests avec rapport de couverture au format Clover (pour SonarCloud)
      # et rapport JUnit (pour SonarCloud tests)
      - name: Execution des tests PHPUnit avec couverture
        env:
          APP_ENV: testing
          APP_KEY: ${{ secrets.APP_KEY }}
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: skillhub_test
          DB_USERNAME: root
          DB_PASSWORD: secret
          MONGO_HOST: 127.0.0.1
          MONGO_PORT: 27017
          MONGO_DATABASE: skillhub_test
          JWT_SECRET: ci_test_secret_key_for_skillhub_pipeline
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
        run: |
          mkdir -p build/logs
          php artisan test \
            --coverage-clover=build/logs/clover.xml \
            --log-junit=build/logs/junit.xml \
            --coverage-min=80

      # Scan SonarCloud avec les rapports generes
      - name: Scan SonarCloud
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ===========================================================
  # JOB 4 : BUILD - Construction de l image Docker
  # ===========================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      # Construction de l image taguee avec le git SHA (requis CDC)
      - name: Construction de l image Docker
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .

      # Verification rapide que l image demarre correctement
      - name: Verification de l image Docker
        run: |
          docker run --rm \
            -e APP_KEY=base64:test_key_for_ci_check_only \
            -e DB_CONNECTION=sqlite \
            -e DB_DATABASE=:memory: \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            php --version

  # ===========================================================
  # JOB 5 (CD) : PUSH - Publication de l image sur Docker Hub
  # Se declenche uniquement apres merge sur main
  # ===========================================================
  push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    # CD : uniquement sur push vers main (pas sur PR)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      # Connexion a Docker Hub via les secrets du pipeline
      - name: Connexion a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Construction et publication de l image avec le git SHA
      - name: Build et push de l image Docker (CDC requis)
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      # Affichage du tag pour preuve (capture d ecran attendue)
      - name: Affichage du tag publie
        run: |
          echo "Image publiee sur Docker Hub :"
          echo "  ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "  ${{ env.IMAGE_NAME }}:latest"
