name: CI SkillHub

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test-and-analyze:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: skillhub_db
          MYSQL_USER: skillhub_user
          MYSQL_PASSWORD: skillhub_pass
          MYSQL_ROOT_PASSWORD: root_pass
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: --health-cmd="mongosh --eval 'db.adminCommand(\"ping\")'" --health-interval=10s --health-timeout=5s --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Installation PHP avec mongodb 2.2 via pecl
      - name: Setup PHP with mongodb 2.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_mysql, mbstring, exif, bcmath, gd, mongodb-2.2.1
          coverage: xdebug

      # Verification de la version mongodb installee
      - name: Check mongodb extension version
        run: php -r "echo phpversion('mongodb');"

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan jwt:secret

      - name: Lint
        run: |
          composer require --dev squizlabs/php_codesniffer --no-interaction -q
          vendor/bin/phpcs --standard=PSR12 app/ --ignore=app/Http/Middleware,app/Providers || true

      - name: Run tests
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: skillhub_db
          DB_USERNAME: skillhub_user
          DB_PASSWORD: skillhub_pass
          MONGO_HOST: 127.0.0.1
          MONGO_PORT: 27017
          MONGO_DATABASE: skillhub_logs
        run: |
          mkdir -p build/logs
          php artisan test --coverage-clover=build/logs/clover.xml --log-junit=build/logs/junit.xml

      - name: Build Docker image
        run: docker build -t skillhub-api:${{ github.sha }} .

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  push-image:
    runs-on: ubuntu-latest
    needs: test-and-analyze
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/skillhub-api:${{ github.sha }} .
          docker push ${{ secrets.DOCKER_USERNAME }}/skillhub-api:${{ github.sha }}
