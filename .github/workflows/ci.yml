name: CI/CD SkillHub Backend

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/skillhub-back
  PHP_VERSION: '8.2'

jobs:

  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql, mbstring, xml, bcmath, intl
          tools: composer:v2
          coverage: none

      - name: Install ext-mongodb 2.2.0
        run: sudo pecl install mongodb-2.2.0 && echo "extension=mongodb.so" | sudo tee /etc/php/8.2/cli/conf.d/20-mongodb.ini

      - name: Cache vendor
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Composer install
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Upload vendor
        uses: actions/upload-artifact@v4
        with:
          name: vendor
          path: vendor/
          retention-days: 1

  lint:
    name: Lint PSR-12
    runs-on: ubuntu-latest
    needs: install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql, mbstring, xml, bcmath, intl
          tools: composer:v2
          coverage: none

      - name: Install ext-mongodb 2.2.0
        run: sudo pecl install mongodb-2.2.0 && echo "extension=mongodb.so" | sudo tee /etc/php/8.2/cli/conf.d/20-mongodb.ini

      - name: Download vendor
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor/

      - name: Install phpcs
        run: composer global require squizlabs/php_codesniffer --quiet

      - name: Run phpcs
        run: ~/.composer/vendor/bin/phpcs --standard=PSR12 --extensions=php --ignore=app/Http/Middleware/CorsMiddleware.php app/

  test:
    name: Tests and SonarCloud
    runs-on: ubuntu-latest
    needs: install
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: skillhub_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -psecret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP with pcov
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo, pdo_mysql, mbstring, xml, bcmath, intl, pcov
          tools: composer:v2
          coverage: pcov

      - name: Install ext-mongodb 2.2.0
        run: sudo pecl install mongodb-2.2.0 && echo "extension=mongodb.so" | sudo tee /etc/php/8.2/cli/conf.d/20-mongodb.ini

      - name: Download vendor
        uses: actions/download-artifact@v4
        with:
          name: vendor
          path: vendor/

      - name: Setup env
        run: cp .env.example .env && php artisan key:generate --quiet

      - name: Run migrations
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: skillhub_test
          DB_USERNAME: root
          DB_PASSWORD: secret
          MONGO_HOST: 127.0.0.1
          MONGO_PORT: 27017
          MONGO_DATABASE: skillhub_test
          JWT_SECRET: ci_test_secret_key_skillhub
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
        run: php artisan migrate --force --quiet

      - name: Run tests with coverage
        env:
          APP_ENV: testing
          APP_KEY: ${{ secrets.APP_KEY }}
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: skillhub_test
          DB_USERNAME: root
          DB_PASSWORD: secret
          MONGO_HOST: 127.0.0.1
          MONGO_PORT: 27017
          MONGO_DATABASE: skillhub_test
          JWT_SECRET: ci_test_secret_key_skillhub
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
        run: mkdir -p build/logs && php artisan test --coverage-clover=build/logs/clover.xml --log-junit=build/logs/junit.xml

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} -t ${{ env.IMAGE_NAME }}:latest .

  push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Show published tag
        run: echo "Published ${{ env.IMAGE_NAME }}:${{ github.sha }}"
