# ─── docker/nginx/frontend.conf — Serveur React SPA ─────────────────────────
# Toutes les routes non trouvées renvoient vers index.html
# (nécessaire pour React Router — gestion des routes côté client)
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Dossier contenant le build React (dist/)
    root /usr/share/nginx/html;
    index index.html;

    # Logs Docker
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Fichiers statiques avec cache long
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React Router — toutes les routes vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Sécurité — bloquer accès fichiers sensibles
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }
}
