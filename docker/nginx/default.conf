# ─── docker/nginx/default.conf — Reverse proxy API Laravel ──────────────────
# Nginx fait office de reverse proxy vers PHP-FPM (port 9000)
# Gère les fichiers statiques (images, css, js) directement
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # Racine du projet Laravel (dossier public/)
    root /var/www/html/public;
    index index.php index.html;

    # Taille maximale des uploads (photos de profil ≤ 2 Mo selon AuthController)
    client_max_body_size 10M;

    # Logs vers stdout/stderr pour Docker
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Gestion des fichiers statiques (photos de profil)
    location /images/ {
        alias /var/www/html/public/images/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Route principale — passe toutes les requêtes PHP à PHP-FPM
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Traitement des fichiers PHP via PHP-FPM (service api sur port 9000)
    location ~ \.php$ {
        fastcgi_pass api:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
        fastcgi_read_timeout 300;
    }

    # Bloquer l'accès aux fichiers .env et .git
    location ~ /\.(env|git) {
        deny all;
        return 404;
    }

    # Endpoint de santé pour le health check Docker
    location /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
