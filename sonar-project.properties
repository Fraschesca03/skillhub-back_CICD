# ============================================================
# SkillHub Backend - Configuration SonarCloud
# Fichier lu automatiquement par SonarCloud lors du scan
# ============================================================

# Identifiant unique du projet sur SonarCloud
sonar.projectKey=skillhub-back

# Nom affiche dans le tableau de bord SonarCloud
sonar.projectName=SkillHub Backend

# Version du projet
sonar.projectVersion=1.0

# Organisation SonarCloud (mettre votre organisation)
sonar.organization=poun-2108

# Sources a analyser
sonar.sources=app

# Dossier des tests
sonar.tests=tests

# Encodage du code source
sonar.sourceEncoding=UTF-8

# Rapport de couverture de code (genere par PHPUnit)
sonar.php.coverage.reportPaths=build/logs/clover.xml

# Rapport de tests PHPUnit
sonar.php.tests.reportPath=build/logs/junit.xml

# Fichiers et dossiers exclus de l analyse
sonar.exclusions=\
    vendor/**,\
    node_modules/**,\
    database/**,\
    storage/**,\
    bootstrap/**,\
    public/**,\
    resources/**

# Fichiers exclus du calcul de couverture
# Ces fichiers sont de la configuration/infrastructure, pas de la logique metier
sonar.coverage.exclusions=\
    app/Http/Middleware/**,\
    app/Providers/**,\
    app/Mail/**,\
    app/Console/**

# Exclusion des doublons sur certains fichiers de configuration
sonar.cpd.exclusions=\
    app/Http/Middleware/**,\
    app/Providers/**
